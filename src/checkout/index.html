<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Outside | Checkout</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header id="main-header" class="divider"></header>

  <main class="divider checkout-page">
    <section class="checkout-shell">
      <h1>Review and Place Your Order</h1>

      <div class="checkout-grid">
        <section class="checkout-card">
          <form id="checkout-form" name="checkout">

            <fieldset class="customer-section">
              <legend>Customer Information</legend>

              <div class="input-group">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="fname" required>
              </div>

              <div class="input-group">
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lname" required>
              </div>
            </fieldset>

            <fieldset class="address-section">
              <legend>Address</legend>

              <div class="input-group">
                <label for="street">Street Address</label>
                <input type="text" id="street" name="street" required>
              </div>

              <div class="input-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required>
              </div>

              <div class="input-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" required>
              </div>

              <div class="input-group">
                <label for="zip">Zip Code</label>
                <input type="text" id="zip" name="zip" required>
              </div>
            </fieldset>

            <fieldset class="payment-section">
              <legend>Payment Information</legend>

              <div class="input-group">
                <label for="cardNumber">Card Number</label>
                <input type="text" id="cardNumber" name="cardNumber" value="1234123412341234" required>
              </div>

              <div class="input-group">
                <label for="expiration">Expiration</label>
                <input type="text" id="expiration" name="expiration" value="12/30" required>
              </div>

              <div class="input-group">
                <label for="code">Security Code</label>
                <input type="text" id="code" name="code" value="123" required>
              </div>
            </fieldset>

            <button type="submit" id="submit-order">Checkout</button>
          </form>
        </section>

        <aside class="summary-card">
          <h2>Order Summary</h2>

          <div class="summary-row">
            <span>Items</span>
            <span id="num-items">0</span>
          </div>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cartTotal">$0.00</span>
          </div>

          <div class="summary-row">
            <span>Tax</span>
            <span id="tax">$0.00</span>
          </div>

          <div class="summary-row">
            <span>Shipping</span>
            <span id="shipping">$0.00</span>
          </div>

          <div class="summary-row total-row">
            <span>Total</span>
            <span id="orderTotal">$0.00</span>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>
</body>
</html>
