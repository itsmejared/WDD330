<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>
    <script src="../js/checkout.js" type="module"></script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <section class="products checkout">
        <h2>Review & Place Your Order</h2>

        <div class="checkout-container">
          <form id="checkout-form" name="checkout" class="checkout-form">
            <section class="checkout-card">
              <h3>Customer Information</h3>

              <div class="form-row two-columns">
                <div class="form-group">
                  <label for="fname">First Name</label>
                  <input type="text" id="fname" name="fname" required />
                </div>

                <div class="form-group">
                  <label for="lname">Last Name</label>
                  <input type="text" id="lname" name="lname" required />
                </div>
              </div>

              <div class="form-group">
                <label for="street">Street Address</label>
                <input type="text" id="street" name="street" required />
              </div>

              <div class="form-row three-columns">
                <div class="form-group">
                  <label for="city">City</label>
                  <input type="text" id="city" name="city" required />
                </div>

                <div class="form-group">
                  <label for="state">State</label>
                  <input type="text" id="state" name="state" required />
                </div>

                <div class="form-group">
                  <label for="zip">Zip Code</label>
                  <input type="text" id="zip" name="zip" required />
                </div>
              </div>
            </section>

            <section class="checkout-card">
              <h3>Payment Information</h3>

              <div class="form-group">
                <label for="cardNumber"> Credit Card Number </label>

                <input type="text" id="cardNumber" name="cardNumber" required />
              </div>

              <div class="form-row two-columns">
                <div class="form-group">
                  <label for="code">Security Code</label>
                  <input type="text" id="code" name="code" required />
                </div>

                <div class="form-group">
                  <label for="expiration"> Expiration Date </label>

                  <input
                    type="text"
                    id="expiration"
                    name="expiration"
                    placeholder="MM/YY"
                    required
                  />
                </div>
              </div>

              <button type="submit">Complete Purchase</button>
            </section>
          </form>

          <aside class="order-summary">
            <h3>Order Summary</h3>

            <p>
              <span>Subtotal</span>
              <span id="subtotal">$0.00</span>
            </p>

            <p>
              <span>Tax</span>
              <span id="tax">--</span>
            </p>

            <p>
              <span>Shipping</span>
              <span id="shipping">--</span>
            </p>

            <p class="order-total">
              <span>Total</span>
              <span id="orderTotal">--</span>
            </p>
          </aside>
        </div>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
