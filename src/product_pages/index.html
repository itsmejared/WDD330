<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Details</title>
    <script src="../js/products.js" type="module"></script>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <div class="breadcrumb-container"></div>
      <section class="product-detail">
        <h2>Product Details</h2>
        <figure>
          <div class="product-detail__image"></div>
        </figure>
        <section id="product-info">
          <h3 id="p-brand"></h3>
          <p id="p-name"></p>
          <p id="p-color"></p>
          <p id="p-description"></p>
          <p id="p-price" class="product-card__price"></p>
          <button id="add-to-cart" data-id="">Add to Cart</button>
        </section>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
