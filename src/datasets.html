<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datasets</title>
    <style>
      li[data-category="fruit"] {
        background-color: lightyellow;
      }

      li[data-category="vegetable"] {
        background-color: lightgreen;
      }

      li[data-category="dairy"] {
        background-color: lightblue;
      }
    </style>
  </head>

  <body>
    <ul id="items">
      <li data-name="banana" data-category="fruit" data-color="yellow">
        Banana
      </li>
      <li data-name="carrot" data-category="vegetable" data-color="orange">
        Carrot
      </li>
      <li data-name="blueberry" data-category="fruit" data-color="blue">
        Blueberry
      </li>
    </ul>
  </body>
  <script>
    const items = document.querySelectorAll("#items li");
    const details = document.createElement("div");
    document.body.appendChild(details);
    items.forEach((item) => {
      item.addEventListener("click", () => {
        details.innerHTML = `
      <h2>Item Details</h2>
      <p>Name: ${item.dataset.name}</p>
      <p>Category: ${item.dataset.category}</p>
      <p>Color: ${item.dataset.color}</p>
    `;
      });
    });
    items.forEach((item) => {
      console.log("Name:", item.dataset.name);
      console.log("Category:", item.dataset.category);
      console.log("Color:", item.dataset.color);
    });
  </script>
</html>
